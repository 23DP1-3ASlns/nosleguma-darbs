[phases.setup]
nixPkgs = ["php84", "php84Packages.composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = []

[phases.deploy]
cmds = ["php artisan migrate --seed --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
